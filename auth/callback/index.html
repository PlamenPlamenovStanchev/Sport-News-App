<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Signing in… | The Sport News App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="bg-light">
    <main
      class="d-flex flex-column align-items-center justify-content-center"
      style="min-height: 100vh;"
    >
      <div class="spinner-border text-dark mb-3" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
      <p class="text-muted">Completing sign-in, please wait…</p>
      <p id="errorMsg" class="text-danger d-none"></p>
    </main>

    <script type="module" src="/src/pages/auth-callback.js"></script>
  </body>
</html>
