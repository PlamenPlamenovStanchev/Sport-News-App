<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | The Sport News App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">SportNews</a>
        <div class="ms-auto" id="navAuthLinks">
          <!-- Populated by login-page.js -->
        </div>
      </div>
    </nav>

    <!-- Card -->
    <main
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 85vh;"
    >
      <div class="card shadow-sm" style="width: 100%; max-width: 460px;">
        <!-- Tab headers -->
        <div class="card-header p-0">
          <ul class="nav nav-tabs card-header-tabs" id="authTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button
                class="nav-link active px-4 py-3"
                id="login-tab"
                data-bs-toggle="tab"
                data-bs-target="#loginPanel"
                type="button"
                role="tab"
              >
                Login
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button
                class="nav-link px-4 py-3"
                id="register-tab"
                data-bs-toggle="tab"
                data-bs-target="#registerPanel"
                type="button"
                role="tab"
              >
                Register
              </button>
            </li>
          </ul>
        </div>

        <div class="card-body p-4">
          <div class="tab-content">

            <!-- ── Login Panel ──────────────────────────────────── -->
            <div
              class="tab-pane fade show active"
              id="loginPanel"
              role="tabpanel"
            >
              <h5 class="mb-4 fw-semibold">Welcome back</h5>

              <div id="loginError" class="alert alert-danger d-none" role="alert"></div>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Email address</label>
                  <input
                    type="email"
                    id="loginEmail"
                    class="form-control"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                  />
                </div>
                <div class="mb-4">
                  <label for="loginPassword" class="form-label">Password</label>
                  <input
                    type="password"
                    id="loginPassword"
                    class="form-control"
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                  />
                </div>
                <button
                  type="submit"
                  id="loginBtn"
                  class="btn btn-dark w-100"
                >
                  Login
                </button>
              </form>

              <!-- Divider -->
              <div class="d-flex align-items-center my-3 text-muted small">
                <hr class="flex-grow-1" />
                <span class="mx-2">or</span>
                <hr class="flex-grow-1" />
              </div>

              <!-- Google OAuth -->
              <button id="googleLoginBtn" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                  <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.8 0 6.9 5.4 3 13.3l7.8 6C12.7 13 17.9 9.5 24 9.5z"/>
                  <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z" />
                  <path fill="#FBBC05" d="M10.8 28.7A14.7 14.7 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7L2.5 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.5 10.7l8.3-6z"/>
                  <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-3.5-13.2-8.7l-7.8 6C6.9 42.6 14.8 48 24 48z"/>
                </svg>
                Continue with Google
              </button>

              <p class="text-center text-muted small mt-3 mb-0">
                Don't have an account?
                <button
                  class="btn btn-link btn-sm p-0 align-baseline"
                  id="switchToRegister"
                >Register here</button>
              </p>
            </div>

            <!-- ── Register Panel ──────────────────────────────── -->
            <div
              class="tab-pane fade"
              id="registerPanel"
              role="tabpanel"
            >
              <h5 class="mb-4 fw-semibold">Create account</h5>

              <div id="registerError"   class="alert alert-danger  d-none" role="alert"></div>
              <div id="registerSuccess" class="alert alert-success d-none" role="alert"></div>

              <form id="registerForm" novalidate>
                <div class="mb-3">
                  <label for="regUsername" class="form-label">Username</label>
                  <input
                    type="text"
                    id="regUsername"
                    class="form-control"
                    placeholder="johndoe"
                    required
                    autocomplete="username"
                  />
                </div>
                <div class="mb-3">
                  <label for="regEmail" class="form-label">Email address</label>
                  <input
                    type="email"
                    id="regEmail"
                    class="form-control"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                  />
                </div>
                <div class="mb-4">
                  <label for="regPassword" class="form-label">Password</label>
                  <input
                    type="password"
                    id="regPassword"
                    class="form-control"
                    placeholder="Min. 6 characters"
                    required
                    minlength="6"
                    autocomplete="new-password"
                  />
                </div>
                <button
                  type="submit"
                  id="registerBtn"
                  class="btn btn-dark w-100"
                >
                  Create Account
                </button>
              </form>

              <!-- Divider -->
              <div class="d-flex align-items-center my-3 text-muted small">
                <hr class="flex-grow-1" />
                <span class="mx-2">or</span>
                <hr class="flex-grow-1" />
              </div>

              <!-- Google OAuth -->
              <button id="googleRegisterBtn" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                  <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.8 0 6.9 5.4 3 13.3l7.8 6C12.7 13 17.9 9.5 24 9.5z"/>
                  <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z" />
                  <path fill="#FBBC05" d="M10.8 28.7A14.7 14.7 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7L2.5 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.5 10.7l8.3-6z"/>
                  <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-3.5-13.2-8.7l-7.8 6C6.9 42.6 14.8 48 24 48z"/>
                </svg>
                Sign up with Google
              </button>

              <p class="text-center text-muted small mt-3 mb-0">
                Already have an account?
                <button
                  class="btn btn-link btn-sm p-0 align-baseline"
                  id="switchToLogin"
                >Login here</button>
              </p>
            </div>

          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/pages/login-page.js"></script>
  </body>
</html>
