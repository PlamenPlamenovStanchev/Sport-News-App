<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | The Sport News App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">SportNews</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="/index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/contact.html">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/login.html">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/register.html">Register</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero -->
    <header class="bg-dark text-white py-5 text-center">
      <div class="container">
        <h1 class="display-4 fw-bold">The Sport News App</h1>
        <p class="lead">Stay updated with the latest sport news</p>
      </div>
    </header>

    <!-- Filters -->
    <section class="container my-4">
      <div class="row g-3 align-items-center">
        <!-- Search -->
        <div class="col-md-6">
          <input
            id="searchInput"
            type="text"
            class="form-control"
            placeholder="Search news by title..."
          />
        </div>
        <!-- Sport Tag Filter -->
        <div class="col-md-6 d-flex flex-wrap gap-2" id="tagFilters">
          <button class="btn btn-dark btn-sm active" data-tag="all">All</button>
          <button class="btn btn-outline-dark btn-sm" data-tag="football">Football</button>
          <button class="btn btn-outline-dark btn-sm" data-tag="basketball">Basketball</button>
          <button class="btn btn-outline-dark btn-sm" data-tag="tennis">Tennis</button>
          <button class="btn btn-outline-dark btn-sm" data-tag="swimming">Swimming</button>
          <button class="btn btn-outline-dark btn-sm" data-tag="athletics">Athletics</button>
        </div>
      </div>
    </section>

    <!-- News Grid -->
    <main class="container my-4">
      <div id="newsGrid" class="row g-4">
        <!-- News cards injected by home.js -->
        <div class="col-12 text-center text-muted" id="loadingMessage">
          Loading news...
        </div>
      </div>

      <!-- Pagination -->
      <nav class="my-5" aria-label="News pagination">
        <ul id="pagination" class="pagination justify-content-center"></ul>
      </nav>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
      <p class="mb-0">&copy; 2026 Sport News App. All rights reserved.</p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/pages/home.js"></script>
  </body>
</html>
