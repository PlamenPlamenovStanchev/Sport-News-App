<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile | The Sport News App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">SportNews</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-1" id="navAuthLinks">
            <!-- Populated by profile.js → navbar.js -->
          </ul>
        </div>
      </div>
    </nav>

    <!-- Profile Card -->
    <main class="container my-5" style="max-width: 720px;">

      <!-- Loading state -->
      <div id="profileLoading" class="text-center py-5">
        <div class="spinner-border text-dark" role="status">
          <span class="visually-hidden">Loading…</span>
        </div>
      </div>

      <!-- Profile info (hidden until loaded) -->
      <div id="profileContent" class="d-none">
        <div class="d-flex align-items-center gap-4 mb-5">
          <!-- Avatar placeholder -->
          <div
            id="profileAvatar"
            class="rounded-circle bg-dark text-white d-flex align-items-center justify-content-center fs-2 fw-bold flex-shrink-0"
            style="width: 80px; height: 80px;"
          >
            ?
          </div>
          <div>
            <h2 class="mb-0" id="profileUsername">—</h2>
            <p class="text-muted mb-1" id="profileEmail">—</p>
            <span class="badge bg-secondary" id="profileRole">—</span>
          </div>
          <div class="ms-auto">
            <button id="logoutBtn" class="btn btn-outline-dark">
              Logout
            </button>
          </div>
        </div>

        <hr class="mb-5" />

        <!-- Favorites -->
        <h4 class="mb-3">My Favorites</h4>
        <div id="favoritesList" class="row g-4">
          <!-- Injected by profile.js -->
        </div>
        <p id="noFavorites" class="text-muted d-none">You haven't saved any articles yet.</p>
      </div>

    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
      <p class="mb-0">&copy; 2026 Sport News App. All rights reserved.</p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/pages/profile.js"></script>
  </body>
</html>
