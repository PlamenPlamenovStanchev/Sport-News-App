<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>My Profile | The Sport News App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">SportNews</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-1" id="navAuthLinks">
            <!-- Populated by profile.js → navbar.js -->
          </ul>
        </div>
      </div>
    </nav>

    <!-- Profile Card -->
    <main class="container my-5" style="max-width: 720px;">

      <!-- Loading state -->
      <div id="profileLoading" class="text-center py-5">
        <div class="spinner-border text-dark" role="status">
          <span class="visually-hidden">Loading…</span>
        </div>
      </div>

      <!-- Profile info (hidden until loaded) -->
      <div id="profileContent" class="d-none">
        <div class="d-flex align-items-center gap-4 mb-5">
          <!-- Avatar placeholder -->
          <div
            id="profileAvatar"
            class="rounded-circle bg-dark text-white d-flex align-items-center justify-content-center fs-2 fw-bold flex-shrink-0"
            style="width: 80px; height: 80px;"
          >
            ?
          </div>
          <div>
            <h2 class="mb-0" id="profileUsername">—</h2>
            <p class="text-muted mb-1" id="profileEmail">—</p>
            <span class="badge bg-secondary" id="profileRole">—</span>
          </div>
          <div class="ms-auto d-flex gap-2">
            <!-- Visible only to admins (toggled by profile.js) -->
            <a
              id="adminPanelBtn"
              class="btn btn-warning d-none"
              href="/pages/admin.html"
            >
              Admin Panel
            </a>
            <!-- Visible only to authors/admins (toggled by profile.js) -->
            <button
              id="addNewsBtn"
              class="btn btn-success d-none"
              data-bs-toggle="modal"
              data-bs-target="#createNewsModal"
            >
              + Add News
            </button>
            <button id="logoutBtn" class="btn btn-outline-dark">
              Logout
            </button>
          </div>
        </div>

        <hr class="mb-5" />

        <!-- My Articles (visible only for authors/admins — toggled by profile.js) -->
        <div id="myArticlesSection" class="d-none mb-5">
          <h4 class="mb-3">My Articles</h4>
          <div id="myArticlesList"></div>
          <p id="noArticles" class="text-muted d-none">You haven't written any articles yet.</p>
        </div>

        <!-- Editor: Pending Articles (visible only for editors/admins — toggled by profile.js) -->
        <div id="editorSection" class="d-none mb-5">
          <h4 class="mb-3">Pending Articles (Moderation)</h4>
          <div id="pendingArticlesList"></div>
          <p id="noPending" class="text-muted d-none">No articles awaiting moderation.</p>
        </div>

        <hr class="mb-5" />

        <!-- Favorites -->
        <h4 class="mb-3">My Favorites</h4>
        <div id="favoritesList" class="row g-4">
          <!-- Injected by profile.js -->
        </div>
        <p id="noFavorites" class="text-muted d-none">You haven't saved any articles yet.</p>
      </div>

    </main>

    <!-- ═══ Create News Modal ═══ -->
    <div class="modal fade" id="createNewsModal" tabindex="-1" aria-labelledby="createNewsModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="createNewsModalLabel">Create News Article</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="modalError" class="alert alert-danger d-none"></div>
            <div id="modalSuccess" class="alert alert-success d-none"></div>

            <form id="createNewsForm">
              <div class="mb-3">
                <label for="newsTitle" class="form-label">Title <span class="text-danger">*</span></label>
                <input type="text" id="newsTitle" class="form-control" placeholder="Article title" required />
              </div>

              <div class="mb-3">
                <label for="newsCategory" class="form-label">Category <span class="text-danger">*</span></label>
                <select id="newsCategory" class="form-select" required>
                  <option value="">Select a category...</option>
                  <!-- Populated by profile.js from categories table -->
                </select>
              </div>

              <div class="mb-3">
                <label for="newsImage" class="form-label">Image <span class="text-danger">*</span></label>
                <input type="file" id="newsImage" class="form-control" accept="image/*" required />
              </div>

              <div class="mb-3">
                <label for="newsContent" class="form-label">Content <span class="text-danger">*</span></label>
                <textarea id="newsContent" class="form-control" rows="8" placeholder="Write your article here..." required></textarea>
              </div>

              <button type="submit" class="btn btn-dark w-100" id="submitNewsBtn">
                Submit for Approval
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ Edit Article Modal (Editor) ═══ -->
    <div class="modal fade" id="editArticleModal" tabindex="-1" aria-labelledby="editArticleModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="editArticleModalLabel">Edit Article</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="editModalError" class="alert alert-danger d-none"></div>
            <div id="editModalSuccess" class="alert alert-success d-none"></div>

            <form id="editArticleForm">
              <input type="hidden" id="editArticleId" />
              <div class="mb-3">
                <label for="editTitle" class="form-label">Title</label>
                <input type="text" id="editTitle" class="form-control" required />
              </div>
              <div class="mb-3">
                <label for="editContent" class="form-label">Content</label>
                <textarea id="editContent" class="form-control" rows="8" required></textarea>
              </div>
              <button type="submit" class="btn btn-dark w-100" id="saveEditBtn">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
      <p class="mb-0">&copy; 2026 Sport News App. All rights reserved.</p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/pages/profile.js"></script>
  </body>
</html>
