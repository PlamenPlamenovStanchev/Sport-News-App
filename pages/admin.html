<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Admin Panel | The Sport News App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">SportNews</a>
        <span class="badge bg-warning text-dark">Admin Panel</span>
      </div>
    </nav>

    <main class="container my-5">
      <h2 class="mb-4">Admin Panel</h2>

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-4" id="adminTabs">
        <li class="nav-item">
          <button class="nav-link active" data-tab="users">Users</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-tab="pending">Pending News</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-tab="allNews">All News</button>
        </li>
      </ul>

      <!-- Tab content -->
      <div id="tabContent">
        <p class="text-muted">Loading...</p>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/pages/admin.js"></script>
  </body>
</html>
