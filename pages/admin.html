<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Admin Panel | The Sport News App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">SportNews</a>
        <span class="badge bg-warning text-dark ms-2 d-none d-sm-inline">Admin</span>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#adminNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
          <ul class="navbar-nav ms-auto gap-2 align-items-sm-center">
            <li class="nav-item">
              <a href="/profile/" class="btn btn-outline-light btn-sm"><i data-lucide="user" class="icon-inline"></i> My Profile</a>
            </li>
            <li class="nav-item">
              <a href="/index.html" class="btn btn-outline-light btn-sm"><i data-lucide="home" class="icon-inline"></i> Home</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-5">
      <h2 class="mb-4">Admin Panel</h2>

      <!-- Loading -->
      <div id="adminLoading" class="text-center py-5">
        <div class="spinner-border text-dark" role="status">
          <span class="visually-hidden">Loading…</span>
        </div>
      </div>

      <!-- Content (hidden until loaded) -->
      <div id="adminContent" class="d-none">

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" data-tab="news" type="button"><i data-lucide="newspaper" class="icon-inline"></i> News</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" data-tab="users" type="button"><i data-lucide="users" class="icon-inline"></i> Users</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" data-tab="messages" type="button"><i data-lucide="mail" class="icon-inline"></i> Messages</button>
          </li>
        </ul>

        <!-- Tab body -->
        <div id="tabContent"></div>
      </div>
    </main>

    <!-- ═══ Add/Edit Article Modal ═══ -->
    <div class="modal fade" id="articleModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="articleModalLabel">Add Article</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="articleModalError" class="alert alert-danger d-none"></div>
            <div id="articleModalSuccess" class="alert alert-success d-none"></div>
            <form id="articleForm">
              <input type="hidden" id="articleFormId" />
              <div class="mb-3">
                <label for="articleFormTitle" class="form-label">Title <span class="text-danger">*</span></label>
                <input type="text" id="articleFormTitle" class="form-control" required />
              </div>
              <div class="mb-3">
                <label for="articleFormCategory" class="form-label">Category <span class="text-danger">*</span></label>
                <select id="articleFormCategory" class="form-select" required>
                  <option value="">Select a category...</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="articleFormImage" class="form-label">Image</label>
                <input type="file" id="articleFormImage" class="form-control" accept="image/*" />
                <small class="text-muted" id="articleFormImageHint"></small>
              </div>
              <div class="mb-3">
                <label for="articleFormContent" class="form-label">Content <span class="text-danger">*</span></label>
                <textarea id="articleFormContent" class="form-control" rows="6" required></textarea>
              </div>
              <div class="mb-3">
                <label for="articleFormStatus" class="form-label">Status</label>
                <select id="articleFormStatus" class="form-select">
                  <option value="true">Approved (Published)</option>
                  <option value="false">Pending</option>
                </select>
              </div>
              <button type="submit" class="btn btn-dark w-100" id="articleFormSubmit">Save</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ Add/Edit User Modal ═══ -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="userModalLabel">Add User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="userModalError" class="alert alert-danger d-none"></div>
            <div id="userModalSuccess" class="alert alert-success d-none"></div>
            <form id="userForm">
              <input type="hidden" id="userFormId" />
              <!-- Only shown for new users -->
              <div id="userFormNewFields">
                <div class="mb-3">
                  <label for="userFormEmail" class="form-label">Email <span class="text-danger">*</span></label>
                  <input type="email" id="userFormEmail" class="form-control" />
                </div>
                <div class="mb-3">
                  <label for="userFormPassword" class="form-label">Password <span class="text-danger">*</span></label>
                  <input type="password" id="userFormPassword" class="form-control" minlength="6" />
                </div>
                <div class="mb-3">
                  <label for="userFormUsername" class="form-label">Username</label>
                  <input type="text" id="userFormUsername" class="form-control" />
                </div>
              </div>
              <div class="mb-3">
                <label for="userFormRole" class="form-label">Role <span class="text-danger">*</span></label>
                <select id="userFormRole" class="form-select" required>
                  <option value="user">User</option>
                  <option value="author">Author</option>
                  <option value="editor">Editor</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <button type="submit" class="btn btn-dark w-100" id="userFormSubmit">Save</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ Reusable Confirmation Modal ═══ -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="confirmModalTitle">Confirm</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p id="confirmModalBody" class="mb-0">Are you sure?</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-sm" id="confirmModalOk">Confirm</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
      <p class="mb-0">&copy; 2026 Sport News App. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/pages/admin.js"></script>
  </body>
</html>
