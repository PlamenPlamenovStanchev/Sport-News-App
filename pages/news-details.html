<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>News Details | The Sport News App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container d-flex">
        <a class="navbar-brand fw-bold" href="/index.html">SportNews</a>
        <a href="/index.html" class="btn btn-outline-light btn-sm ms-auto my-auto"><i data-lucide="arrow-left" class="icon-inline"></i> Back to Home</a>
      </div>
    </nav>

    <main class="container my-4 my-md-5 article-container">
      <!-- News content injected by news-details.js -->
      <div id="newsContent">
        <div class="loading-spinner">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading…</span>
          </div>
          <span>Loading article…</span>
        </div>
      </div>

      <!-- Like & Favourite Section -->
      <div id="likeSection" class="d-flex align-items-center gap-3 mt-4 mb-2">
        <button id="likeBtn" class="btn btn-outline-danger btn-sm d-none" title="Like this article">
          <i data-lucide="heart" class="icon-inline"></i> Like
        </button>
        <span class="text-muted small"><span id="likeCount">0</span> likes</span>
        <button id="favBtn" class="btn btn-outline-warning btn-sm d-none" title="Add to Favourites">
          <i data-lucide="bookmark" class="icon-inline"></i> Favourite
        </button>
      </div>

      <hr class="my-5" />

      <!-- Comments section -->
      <section id="commentsSection">
        <h4>Comments</h4>
        <div id="commentsList" class="mb-4">
          <!-- Comments loaded by news-details.js -->
        </div>

        <!-- Add comment form (shown only for logged-in users) -->
        <form id="commentForm" class="d-none">
          <div class="mb-3">
            <textarea id="commentInput" class="form-control" rows="3" placeholder="Write a comment..."></textarea>
          </div>
          <button type="submit" class="btn btn-dark">Post Comment</button>
        </form>
        <p id="loginPrompt" class="text-muted">
          <a href="/pages/login.html">Login</a> to leave a comment.
        </p>
      </section>

      <!-- Author Section -->
      <hr class="my-5" />
      <section id="authorSection" class="d-none">
        <div class="d-flex align-items-center gap-3">
          <div
            id="authorAvatar"
            class="rounded-circle profile-avatar d-flex align-items-center justify-content-center fs-4 fw-bold flex-shrink-0"
            style="width: 56px; height: 56px;"
          >?</div>
          <div>
            <p class="mb-0 fw-semibold">Written by</p>
            <h5 class="mb-0" id="authorName">—</h5>
          </div>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/pages/news-details.js"></script>
  </body>
</html>
