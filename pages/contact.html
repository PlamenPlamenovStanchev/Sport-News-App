<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Contact | The Sport News App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">SportNews</a>
      </div>
    </nav>

    <main class="container my-5" style="max-width: 600px;">
      <h1 class="mb-3">Become a Contributor</h1>
      <p class="text-muted mb-4">
        Passionate about sport and want to share your voice? We're always looking
        for dedicated <strong>authors</strong> and <strong>editors</strong> to join
        our team. Fill in the form below and tell us how you'd like to contribute.
      </p>

      <div id="successMessage" class="alert alert-success d-none"></div>

      <form id="contactForm">
        <div class="mb-3">
          <label for="name" class="form-label">Your Name</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required />
        </div>
        <div class="mb-3">
          <label for="role" class="form-label">I'd like to apply as</label>
          <select id="role" class="form-select" required>
            <option value="" disabled selected>Select a role...</option>
            <option value="author">Author — write and submit articles</option>
            <option value="editor">Editor — review and moderate content</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Tell us about yourself</label>
          <textarea id="message" class="form-control" rows="5" placeholder="Your experience, favourite sports, why you want to contribute..." required></textarea>
        </div>
        <button type="submit" class="btn btn-dark w-100">Submit Application</button>
      </form>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
      <p class="mb-0">&copy; 2026 Sport News App. All rights reserved.</p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/pages/contact.js"></script>
  </body>
</html>
