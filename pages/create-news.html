<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create News | The Sport News App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">SportNews</a>
      </div>
    </nav>

    <main class="container my-5" style="max-width: 700px;">
      <h2 class="mb-4">Create News Article</h2>

      <div id="errorMessage" class="alert alert-danger d-none"></div>
      <div id="successMessage" class="alert alert-success d-none"></div>

      <form id="createNewsForm">
        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input type="text" id="title" class="form-control" placeholder="Article title" required />
        </div>
        <div class="mb-3">
          <label for="sportTag" class="form-label">Sport Tag</label>
          <select id="sportTag" class="form-select" required>
            <option value="">Select a sport...</option>
            <option value="football">Football</option>
            <option value="basketball">Basketball</option>
            <option value="tennis">Tennis</option>
            <option value="swimming">Swimming</option>
            <option value="athletics">Athletics</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="imageUrl" class="form-label">Image URL</label>
          <input type="url" id="imageUrl" class="form-control" placeholder="https://example.com/image.jpg" />
        </div>
        <div class="mb-3">
          <label for="content" class="form-label">Content</label>
          <textarea id="content" class="form-control" rows="10" placeholder="Write your article here..." required></textarea>
        </div>
        <button type="submit" class="btn btn-dark">Submit for Review</button>
      </form>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/pages/create-news.js"></script>
  </body>
</html>
