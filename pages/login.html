<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | The Sport News App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">SportNews</a>
      </div>
    </nav>

    <main class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
      <div class="card shadow p-4" style="width: 100%; max-width: 420px;">
        <h2 class="card-title text-center mb-4">Login</h2>

        <div id="errorMessage" class="alert alert-danger d-none"></div>

        <form id="loginForm">
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-dark w-100">Login</button>
        </form>

        <p class="text-center mt-3 mb-0">
          Don't have an account?
          <a href="/pages/register.html">Register</a>
        </p>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="/src/pages/login.js"></script>
  </body>
</html>
